<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CEO XB — The Bench</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<!--
  CEO XB — The Bench · Concept Prototype
  ========================================
  TYPE SCALE
  display-xl : 80px / 800 / leading-none / tracking -0.025em
  h1         : 28px / 800 / leading 1.15
  h2         : 22–24px / 800 / leading 1.2
  h3         : 19px / 800 / leading tight
  body-l     : 17px / 500
  body       : 16px / 400 / leading 1.5
  body-s     : 15px / 400 / leading 1.5
  small      : 14px / 400 or 500
  label      : 13px / 600 / uppercase / tracking 0.08em

  CONTRAST PAIRS (WCAG AA = 4.5:1 min for normal text)
  white on #0C4C6F  ≈ 9.1:1  ✓ AAA
  white on #0A3761  ≈ 10.4:1 ✓ AAA
  #3F464C on white  ≈ 7.2:1  ✓ AAA
  #5D666F on white  ≈ 5.1:1  ✓ AA
-->
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:#cbd5e1;min-height:100vh;display:flex;align-items:flex-start;justify-content:center;font-family:'Plus Jakarta Sans',sans-serif;}
  .app-frame{width:100%;max-width:390px;min-height:100vh;background:#fff;box-shadow:0 0 40px rgba(0,0,0,0.08);position:relative;overflow:hidden;display:flex;flex-direction:column;}
  .screen{display:flex;flex-direction:column;flex:1;min-height:100vh;}

  /* EYEBROWS */
  .eyebrow{font-size:13px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:rgba(255,255,255,0.65);margin-bottom:8px;}
  .eyebrow-dark{font-size:13px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:#5D666F;margin-bottom:8px;}
  .eyebrow-accent{font-size:13px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:#106E9E;margin-bottom:8px;}

  /* ROLE SELECTION */
  .role-header{background:#0A3761;padding:56px 24px 32px;}
  .role-header h1{font-size:28px;font-weight:800;line-height:1.15;color:#fff;}
  .role-body{padding:24px;flex:1;display:flex;flex-direction:column;gap:12px;overflow-y:auto;}
  .role-card{border:1.5px solid rgba(0,0,0,0.1);border-radius:16px;padding:20px;cursor:pointer;transition:all 0.3s ease;display:flex;align-items:flex-start;gap:14px;background:#fff;}
  .role-card.selected{background:#0C4C6F;border-color:#0C4C6F;}
  .role-card:focus{outline:2px solid #106E9E;outline-offset:2px;}
  .role-icon{width:44px;height:44px;border-radius:12px;background:#EDF2F7;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background 0.3s;}
  .role-card.selected .role-icon{background:rgba(255,255,255,0.15);}
  .role-icon svg{width:22px;height:22px;stroke:#0C4C6F;transition:stroke 0.3s;}
  .role-card.selected .role-icon svg{stroke:#fff;}
  .role-title{font-size:17px;font-weight:700;color:#000;transition:color 0.3s;margin-bottom:3px;}
  .role-card.selected .role-title{color:#fff;}
  .role-desc{font-size:15px;font-weight:400;color:#5D666F;line-height:1.45;transition:color 0.3s;}
  .role-card.selected .role-desc{color:rgba(255,255,255,0.72);}
  .check-ring{width:22px;height:22px;border-radius:50%;border:1.5px solid rgba(0,0,0,0.15);margin-left:auto;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all 0.3s;}
  .role-card.selected .check-ring{background:#fff;border-color:#fff;}
  .check-ring-dot{width:10px;height:10px;border-radius:50%;background:#0C4C6F;opacity:0;}
  .role-card.selected .check-ring-dot{opacity:1;}
  .cta-area{padding:16px 24px 32px;background:#fff;}
  .btn-primary{width:100%;min-height:56px;background:#0C4C6F;color:#fff;font-size:17px;font-weight:500;font-family:'Plus Jakarta Sans',sans-serif;border:none;border-radius:100px;cursor:pointer;transition:background 0.5s,opacity 0.3s;letter-spacing:0.01em;}
  .btn-primary:hover{background:#0A3761;}
  .btn-primary:disabled{opacity:0.45;cursor:not-allowed;background:#0C4C6F;}
  .btn-primary:focus-visible{outline:2px solid #106E9E;outline-offset:2px;}
  .helper-text{font-size:14px;color:#5D666F;text-align:center;margin-top:8px;}

  /* HOME */
  .home-header{background:#0A3761;padding:52px 24px 24px;display:flex;align-items:center;justify-content:space-between;}
  .home-header h1{font-size:28px;font-weight:800;color:#fff;line-height:1.15;}
  .notif-badge{width:10px;height:10px;border-radius:50%;background:#106E9E;position:absolute;top:1px;right:1px;}
  .avatar-sm{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;color:#fff;flex-shrink:0;}
  .home-body{flex:1;overflow-y:auto;padding:0 0 100px;}

  /* BENCH HERO CARD */
  @keyframes slideUp{from{opacity:0;transform:translateY(18px);}to{opacity:1;transform:translateY(0);}}
  .bench-card{margin:20px 16px 0;border-radius:20px;overflow:hidden;animation:slideUp 0.28s ease-out both;background:linear-gradient(145deg,#0C4C6F 0%,#0A3761 55%,#062C50 100%);position:relative;}
  .bench-card::before{content:'';position:absolute;top:-40px;right:-40px;width:180px;height:180px;border-radius:50%;background:radial-gradient(circle,rgba(16,110,158,0.45) 0%,transparent 70%);pointer-events:none;}
  .bench-card-inner{padding:22px 20px 20px;position:relative;z-index:1;}
  .bench-eyebrow{font-size:13px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:#fff;background:#106E9E;display:inline-block;padding:5px 12px;border-radius:100px;margin-bottom:14px;}
  .bench-peer-row{display:flex;align-items:center;gap:12px;margin-bottom:14px;}
  .peer-avatar{width:46px;height:46px;border-radius:50%;background:#106E9E;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:800;color:#fff;flex-shrink:0;border:2px solid rgba(255,255,255,0.15);}
  .bench-name{font-size:17px;font-weight:700;color:#fff;line-height:1.2;}
  .bench-company{font-size:14px;color:rgba(255,255,255,0.6);}
  .bench-message{font-size:15px;color:rgba(255,255,255,0.88);line-height:1.5;margin-bottom:18px;padding:12px 14px;background:rgba(255,255,255,0.08);border-radius:12px;border:1px solid rgba(255,255,255,0.1);}
  .bench-meta{font-size:13px;color:rgba(255,255,255,0.45);margin-bottom:18px;display:flex;align-items:center;gap:6px;}
  .bench-actions{display:flex;flex-direction:column;gap:10px;}
  .btn-accept{min-height:48px;background:#fff;color:#0C4C6F;font-size:15px;font-weight:700;font-family:'Plus Jakarta Sans',sans-serif;border:none;border-radius:100px;cursor:pointer;transition:background 0.3s,color 0.3s;}
  .btn-accept:hover{background:#EDF2F7;}
  .btn-accept:focus-visible{outline:2px solid #106E9E;outline-offset:2px;}
  .btn-decline{min-height:48px;background:rgba(255,255,255,0.1);color:rgba(255,255,255,0.8);font-size:15px;font-weight:500;font-family:'Plus Jakarta Sans',sans-serif;border:1px solid rgba(255,255,255,0.2);border-radius:100px;cursor:pointer;transition:background 0.3s;}
  .btn-decline:hover{background:rgba(255,255,255,0.18);}

  /* ACTIVITY */
  .section-header{padding:24px 20px 10px;display:flex;align-items:center;justify-content:space-between;}
  .section-title{font-size:17px;font-weight:700;color:#000;}
  .see-all{font-size:14px;color:#106E9E;font-weight:500;cursor:pointer;}
  .activity-item{display:flex;align-items:flex-start;gap:12px;padding:14px 20px;border-bottom:1px solid rgba(0,0,0,0.06);}
  .activity-text{flex:1;}
  .activity-name{font-size:15px;font-weight:600;color:#000;}
  .activity-detail{font-size:14px;color:#5D666F;margin-top:1px;line-height:1.4;}
  .activity-time{font-size:13px;color:#5D666F;flex-shrink:0;margin-top:1px;}
  .pill{font-size:13px;font-weight:600;padding:3px 10px;border-radius:100px;display:inline-block;margin-top:5px;}
  .pill-blue{background:rgba(16,110,158,0.1);color:#106E9E;}
  .pill-navy{background:rgba(12,76,111,0.08);color:#0C4C6F;}

  /* ROLE BADGE */
  .role-badge-row{margin:16px 16px 0;padding:14px 16px;background:#EDF2F7;border-radius:12px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
  .role-badge-label{font-size:14px;color:#3F464C;font-weight:500;}

  /* BOTTOM NAV */
  .bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:390px;height:80px;background:#0A3761;display:flex;align-items:center;justify-content:space-around;padding:0 8px 8px;z-index:100;}
  .nav-item{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:8px 12px;position:relative;min-width:44px;min-height:44px;justify-content:center;}
  .nav-label{font-size:11px;font-weight:500;color:rgba(255,255,255,0.45);font-family:'Plus Jakarta Sans',sans-serif;}
  .nav-label.active{color:#fff;}
  .nav-underline{position:absolute;bottom:2px;left:50%;transform:translateX(-50%);width:16px;height:2px;background:#106E9E;border-radius:1px;}
  .nav-icon{width:22px;height:22px;}

  /* DECLINE MODAL */
  .modal-overlay{position:fixed;top:0;left:50%;transform:translateX(-50%);width:100%;max-width:390px;height:100%;background:rgba(0,0,0,0.45);z-index:200;display:flex;align-items:flex-end;}
  .modal-sheet{background:#fff;border-radius:28px 28px 0 0;padding:28px 24px 40px;width:100%;animation:slideUp 0.25s ease-out;}
  .modal-pill{width:36px;height:4px;background:rgba(0,0,0,0.12);border-radius:2px;margin:0 auto 24px;}
  .modal-title{font-size:22px;font-weight:800;color:#000;margin-bottom:8px;line-height:1.2;}
  .modal-body-text{font-size:15px;color:#5D666F;line-height:1.5;margin-bottom:24px;}
  .modal-actions{display:flex;flex-direction:column;gap:10px;}
  .btn-soft-decline{min-height:52px;background:#EDF2F7;color:#3F464C;font-size:16px;font-weight:600;font-family:'Plus Jakarta Sans',sans-serif;border:none;border-radius:100px;cursor:pointer;}
  .btn-soft-decline:hover{background:#dde4ec;}
  .btn-cancel{min-height:48px;background:transparent;color:#5D666F;font-size:15px;font-weight:500;font-family:'Plus Jakarta Sans',sans-serif;border:none;cursor:pointer;}

  @media(max-width:390px){
    body{background:#fff;}
    .app-frame{box-shadow:none;}
    .bottom-nav{position:fixed;}
  }
</style>
</head>
<body>
<div class="app-frame" id="app"></div>

<script>
const ROLES = [
  {
    id:'coaching',
    label:'Coaching',
    desc:'1-on-1 guidance on decisions, strategy, or leadership.',
    icon:`<svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>`
  },
  {
    id:'introductions',
    label:'Introductions',
    desc:'Opening doors to investors, partners, or talent when the fit is right.',
    icon:`<svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>`
  },
  {
    id:'review',
    label:'Review & Feedback',
    desc:'Frank feedback on pitches, investor updates, or strategic docs.',
    icon:`<svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>`
  },
  {
    id:'sounding',
    label:'Sounding Board',
    desc:'A thinking partner for the calls that don\'t fit on a calendar.',
    icon:`<svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>`
  },
];


const state = {
  view: 'role-select',
  selectedRoles: [],
  showDeclineModal: false,
  benchAccepted: false,
  benchDeclined: false,
};

function render() {
  const app = document.getElementById('app');
  if (state.view === 'role-select') app.innerHTML = renderRoleSelect();
  else if (state.view === 'home')    app.innerHTML = renderHome();
  bindEvents();
}

/* ── ROLE SELECT ── */
function renderRoleSelect() {
  const anySelected = state.selectedRoles.length > 0;
  return `
  <div class="screen">
    <div class="role-header">
      <div class="eyebrow">The Bench</div>
      <h1>How will you show up for your cohort?</h1>
      <p style="font-size:15px;color:rgba(255,255,255,0.65);margin-top:10px;line-height:1.5;">
        Select the ways you're willing to help peers. You'll be notified when someone needs exactly this.
      </p>
    </div>
    <div class="role-body">
      ${ROLES.map(r => {
        const sel = state.selectedRoles.includes(r.id);
        return `<div class="role-card${sel ? ' selected' : ''}" tabindex="0" role="checkbox" aria-checked="${sel}" data-role="${r.id}">
          <div class="role-icon">${r.icon}</div>
          <div style="flex:1;">
            <div class="role-title">${r.label}</div>
            <div class="role-desc">${r.desc}</div>
          </div>
          <div class="check-ring" aria-hidden="true"><div class="check-ring-dot"></div></div>
        </div>`;
      }).join('')}
      <p class="helper-text">You can update this any time from your profile.</p>
    </div>
    <div class="cta-area">
      <button class="btn-primary" id="cta-confirm" ${anySelected ? '' : 'disabled'}>
        ${anySelected
          ? `Commit to ${state.selectedRoles.length === 1 ? '1 role' : state.selectedRoles.length + ' roles'} →`
          : 'Select at least one role'}
      </button>
    </div>
  </div>`;
}

/* ── HOME ── */
function renderHome() {
  return `
  <div class="screen">
    <div class="home-header">
      <div>
        <div class="eyebrow">CEO XB · Cohort 4</div>
        <h1>Good morning,<br>Joachim.</h1>
      </div>
      <div style="position:relative;">
        <div style="width:42px;height:42px;border-radius:50%;background:#106E9E;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;color:#fff;cursor:pointer;" aria-label="Profile">JB</div>
        <div class="notif-badge" aria-hidden="true"></div>
      </div>
    </div>

    <div class="home-body">

      ${state.benchDeclined ? `
        <div style="margin:20px 16px 0;padding:16px;background:#EDF2F7;border-radius:16px;">
          <div class="eyebrow-dark" style="margin-bottom:4px;">Bench request</div>
          <div style="font-size:15px;color:#3F464C;">You declined Marcus Tan's request. We won't show you this one again.</div>
        </div>
      ` : `
        <div class="bench-card" role="region" aria-label="Bench request from Marcus Tan">
          <div class="bench-card-inner">
            <div class="bench-eyebrow">The Bench · Introduction Request</div>
            <div class="bench-peer-row">
              <div class="peer-avatar" aria-hidden="true">MT</div>
              <div>
                <div class="bench-name">Marcus Tan</div>
                <div class="bench-company">CEO, Caldera Bio · Berlin</div>
              </div>
            </div>
            <div class="bench-message">
              "Looking for a warm intro to Series B medtech investors ahead of our raise. Joachim — your network is exactly what I need right now."
            </div>
            <div class="bench-meta">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
              2 hours ago · matches your Introductions commitment
            </div>
            ${state.benchAccepted ? `
              <div style="padding:12px 14px;background:rgba(255,255,255,0.1);border-radius:12px;border:1px solid rgba(255,255,255,0.15);text-align:center;">
                <div style="font-size:14px;font-weight:600;color:rgba(255,255,255,0.9);margin-bottom:3px;">Request accepted</div>
                <div style="font-size:13px;color:rgba(255,255,255,0.55);">Marcus will be notified. You'll connect via the platform shortly.</div>
              </div>
            ` : `
              <div class="bench-actions">
                <button class="btn-accept" id="btn-accept">Accept request</button>
                <button class="btn-decline" id="btn-decline">Not Now</button>
              </div>
            `}
          </div>
        </div>
      `}

      <div class="role-badge-row">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#106E9E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
        <span class="role-badge-label">You're on the Bench for</span>
        <div style="display:flex;gap:6px;flex-wrap:wrap;">
          ${state.selectedRoles.map(id => {
            const r = ROLES.find(x => x.id === id);
            return `<span class="pill pill-blue">${r.label}</span>`;
          }).join('')}
        </div>
      </div>

    </div>

    ${renderBottomNav('home')}
    ${state.showDeclineModal ? renderDeclineModal() : ''}
  </div>`;
}

/* ── DECLINE MODAL ── */
function renderDeclineModal() {
  return `
  <div class="modal-overlay" id="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal-sheet">
      <div class="modal-pill" aria-hidden="true"></div>
      <div class="eyebrow-accent">Declining this request</div>
      <div class="modal-title" id="modal-title">Step back from Marcus's request?</div>
      <div class="modal-body-text">He'll be notified that you're not available right now. You can still respond if he reaches out directly.</div>
      <div class="modal-actions">
        <button class="btn-soft-decline" id="btn-confirm-decline">Yes, decline this one</button>
        <button class="btn-cancel" id="btn-cancel-modal">Keep it open</button>
      </div>
    </div>
  </div>`;
}

/* ── BOTTOM NAV ── */
function renderBottomNav(active) {
  const tabs = [
    {id:'home',    label:'Home',    path:'M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z M9 22V12h6v10'},
    {id:'learn',   label:'Learn',   path:'M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z'},
    {id:'connect', label:'Connect', path:'M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2 M9 7a4 4 0 1 0 0-8 4 4 0 0 0 0 8 M23 21v-2a4 4 0 0 0-3-3.87 M16 3.13a4 4 0 0 1 0 7.75'},
    {id:'discuss', label:'Discuss', path:'M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z'},
    {id:'profile', label:'Profile', path:'M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2 M12 11a4 4 0 1 0 0-8 4 4 0 0 0 0 8'},
  ];
  return `<nav class="bottom-nav" aria-label="Main navigation">
    ${tabs.map(t => `
      <div class="nav-item" data-nav="${t.id}" role="button" tabindex="0" aria-label="${t.label}${t.id === active ? ', current page' : ''}">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="${t.id === active ? 'rgba(255,255,255,0.95)' : 'none'}" stroke="${t.id === active ? 'rgba(255,255,255,0.95)' : 'rgba(255,255,255,0.45)'}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          ${t.path.split(' M').map((seg,i) => i===0 ? `<path d="${seg}"/>` : `<path d="M${seg}"/>`).join('')}
        </svg>
        <span class="nav-label${t.id === active ? ' active' : ''}">${t.label}</span>
        ${t.id === active ? '<div class="nav-underline" aria-hidden="true"></div>' : ''}
      </div>
    `).join('')}
  </nav>`;
}

/* ── EVENT BINDING ── */
function bindEvents() {

  // Role cards
  document.querySelectorAll('[data-role]').forEach(el => {
    el.addEventListener('click', () => toggleRole(el.dataset.role));
    el.addEventListener('keydown', e => {
      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); toggleRole(el.dataset.role); }
    });
  });

  function toggleRole(id) {
    if (state.selectedRoles.includes(id)) {
      state.selectedRoles = state.selectedRoles.filter(r => r !== id);
    } else {
      state.selectedRoles = [...state.selectedRoles, id];
    }
    render();
  }

  // CTA confirm
  const ctaBtn = document.getElementById('cta-confirm');
  if (ctaBtn) ctaBtn.addEventListener('click', () => { state.view = 'home'; render(); });

  // Accept bench request
  const acceptBtn = document.getElementById('btn-accept');
  if (acceptBtn) acceptBtn.addEventListener('click', () => { state.benchAccepted = true; render(); });

  // Open decline modal
  const declineBtn = document.getElementById('btn-decline');
  if (declineBtn) declineBtn.addEventListener('click', () => { state.showDeclineModal = true; render(); });

  // Confirm decline
  const confirmDecline = document.getElementById('btn-confirm-decline');
  if (confirmDecline) confirmDecline.addEventListener('click', () => {
    state.benchDeclined = true;
    state.showDeclineModal = false;
    render();
  });

  // Cancel modal
  const cancelModal = document.getElementById('btn-cancel-modal');
  if (cancelModal) cancelModal.addEventListener('click', () => { state.showDeclineModal = false; render(); });

  // Tap overlay to close modal
  const overlay = document.getElementById('modal-overlay');
  if (overlay) overlay.addEventListener('click', e => {
    if (e.target === overlay) { state.showDeclineModal = false; render(); }
  });
}

render();
</script>
</body>
</html>
